name: aura_music
description: Aura Music - A modern Flutter music player with elegant UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Audio playback (stable, actively maintained)
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # Permissions
  permission_handler: ^11.3.1

  # File & media access
  on_audio_query: ^2.9.0

  # UI & UX
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  google_fonts: ^6.2.1

  # Utilities
  rxdart: ^0.28.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
   - assets/images/
   - assets/icons/