# ✅ Optimisations Gradle recommandées pour Flutter + Kotlin DSL
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# ✅ Kotlin DSL
kotlin.code.style=official

# ✅ Android X (obligatoire avec les plugins Flutter modernes)
android.useAndroidX=true
android.enableJetifier=true

# ✅ Désactive l'ancien R8 full mode si problèmes de minification
android.enableR8.fullMode=false

# ✅ Supprime l'avertissement sur le namespace dans le Manifest
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings